plugins {
    id 'com.android.application'
}

android {
    compileSdk 35
    namespace "com.tpcstld.twozerogame"

    defaultConfig {
        applicationId "com.tpcstld.twozerogame"

        minSdkVersion 21
        targetSdkVersion 35

        versionCode 1011
        versionName "1.5.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.txt'
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'com.google.android.gms:play-services-auth:21.4.0'
    implementation 'com.google.android.gms:play-services-games:24.0.0'

    // Resolve Kotlin stdlib conflicts
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:2.0.21'
    constraints {
        implementation('org.jetbrains.kotlin:kotlin-stdlib-jdk7') {
            because 'kotlin-stdlib supersedes kotlin-stdlib-jdk7'
        }
        implementation('org.jetbrains.kotlin:kotlin-stdlib-jdk8') {
            because 'kotlin-stdlib supersedes kotlin-stdlib-jdk8'
        }
    }
}
